<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Stay Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ddfa3fd6c7.js" crossorigin="anonymous"></script>
</head>
<body>

    <section id="header">
        <a href="index.html"><img src="images/logo.png" alt="Stay Home" class="logo"></a>
        <div><ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul></div>
        <div class="header-actions" id="header-actions">
            <a href="cart.html" class="header-icon-btn"><i class="fa-solid fa-bag-shopping"></i></a>
        </div>
        <div id="mobile"><i id="bar" class="fa-solid fa-bars"></i></div>
    </section>

    <div class="auth-page-wrapper">
        <div class="auth-card">
            <a href="index.html"><img src="images/logo.png" alt="Stay Home" class="auth-logo"></a>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join Stay Home and start shopping today</p>

            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="+880 1812345678" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus" style="margin-right:8px"></i>Create Account
                </button>
            </form>

            <div class="auth-switch">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>
            <div style="text-align:center;margin-top:16px">
                <a href="index.html" style="font-size:13px;color:var(--text-muted)">
                    <i class="fas fa-arrow-left" style="margin-right:4px"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Stay Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ddfa3fd6c7.js" crossorigin="anonymous"></script>
</head>
<body>

    <section id="header">
        <a href="index.html"><img src="images/logo.png" alt="Stay Home" class="logo"></a>
        <div><ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul></div>
        <div class="header-actions" id="header-actions">
            <a href="cart.html" class="header-icon-btn header-cart-btn"><i class="fa-solid fa-bag-shopping"></i><span class="cart-badge" style="display:none">0</span></a>
            <button class="header-icon-btn" onclick="openLoginModal()"><i class="fas fa-user"></i></button>
        </div>
        <div id="mobile">
            <a href="cart.html" style="color:#1a1a1a;display:flex;align-items:center;justify-content:center;width:40px;height:40px"><i class="fa-solid fa-bag-shopping"></i><span class="cart-badge" style="display:none">0</span></a>
            <i id="bar" class="fa-solid fa-bars"></i>
        </div>
    </section>

    <section id="page-header">
        <h2>Checkout</h2>
        <p>Complete your order securely</p>
        <div class="breadcrumb">
            <a href="index.html">Home</a><i class="fas fa-chevron-right"></i>
            <a href="cart.html">Cart</a><i class="fas fa-chevron-right"></i>
            <span>Checkout</span>
        </div>
    </section>

    <div class="checkout-layout">
        <!-- Form -->
        <div class="checkout-form-col">
            <form id="checkout-form">
                <!-- Shipping -->
                <div class="checkout-section">
                    <div class="checkout-section-title"><i class="fas fa-map-marker-alt"></i> Shipping Address</div>
                    <div class="form-group">
                        <label>Full Shipping Address</label>
                        <textarea id="shipping-address" rows="3" placeholder="House, Road, Area, City, Bangladesh" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="shipping-phone" placeholder="+880 1812345678" required>
                    </div>
                </div>

                <!-- Payment -->
                <div class="checkout-section">
                    <div class="checkout-section-title"><i class="fas fa-credit-card"></i> Payment Method</div>
                    <div class="payment-method-options">
                        <label class="payment-option active" onclick="selectPayment(this)">
                            <input type="radio" name="payment" value="COD" checked>
                            <div>
                                <div class="payment-option-label">Cash on Delivery</div>
                                <div style="font-size:12px;color:var(--text-muted)">Pay when you receive your order</div>
                            </div>
                            <i class="fas fa-money-bill-wave payment-option-icon"></i>
                        </label>
                        <label class="payment-option" onclick="selectPayment(this)">
                            <input type="radio" name="payment" value="MOBILE_BANKING">
                            <div>
                                <div class="payment-option-label">Mobile Banking</div>
                                <div style="font-size:12px;color:var(--text-muted)">bKash, Nagad, Rocket</div>
                            </div>
                            <i class="fas fa-mobile-alt payment-option-icon"></i>
                        </label>
                        <label class="payment-option" onclick="selectPayment(this)">
                            <input type="radio" name="payment" value="CREDIT_CARD">
                            <div>
                                <div class="payment-option-label">Credit / Debit Card</div>
                                <div style="font-size:12px;color:var(--text-muted)">Visa, Mastercard</div>
                            </div>
                            <i class="fas fa-credit-card payment-option-icon"></i>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:16px;font-size:16px">
                    <i class="fas fa-lock"></i> Place Order
                </button>
            </form>
        </div>

        <!-- Summary -->
        <div class="checkout-summary-col">
            <div style="font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
                <i class="fas fa-receipt" style="color:var(--primary);margin-right:8px"></i>Order Summary
            </div>
            <div id="order-preview-items">
                <div class="skeleton" style="height:60px;margin-bottom:10px;border-radius:8px"></div>
                <div class="skeleton" style="height:60px;margin-bottom:10px;border-radius:8px"></div>
            </div>
            <div class="order-totals">
                <div class="order-total-row"><span class="total-label">Subtotal</span><span class="total-value" id="preview-subtotal">৳0.00</span></div>
                <div class="order-total-row"><span class="total-label">Delivery</span><span class="total-value" id="preview-delivery">৳60.00</span></div>
                <div class="order-total-row grand-total"><span>Total</span><span id="preview-total" style="color:var(--primary)">৳0.00</span></div>
            </div>
        </div>
    </div>

    <footer class="section-p1">
        <div class="col"><img class="logo" src="images/logo.png" alt="Stay Home"><h4>Contact</h4><p>Chatogram, Bangladesh</p></div>
        <div class="col"><h4>Quick Links</h4><a href="shop.html">Shop</a><a href="cart.html">Cart</a><a href="orders.html">Orders</a></div>
        <div class="copyright"><p>&copy; 2026 Stay Home. All rights reserved.</p></div>
    </footer>

    <script src="script.js"></script>
    <script>
        function selectPayment(label) {
            document.querySelectorAll('.payment-option').forEach(l => l.classList.remove('active'));
            label.classList.add('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Stay Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ddfa3fd6c7.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Minimal Header -->
    <section id="header">
        <a href="index.html"><img src="images/logo.png" alt="Stay Home" class="logo"></a>
        <div><ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul></div>
        <div class="header-actions" id="header-actions">
            <a href="cart.html" class="header-icon-btn header-cart-btn"><i class="fa-solid fa-bag-shopping"></i><span class="cart-badge" style="display:none">0</span></a>
        </div>
        <div id="mobile">
            <i id="bar" class="fa-solid fa-bars"></i>
        </div>
    </section>

    <div class="auth-page-wrapper">
        <div class="auth-card">
            <a href="index.html"><img src="images/logo.png" alt="Stay Home" class="auth-logo"></a>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your Stay Home account</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign In
                </button>
            </form>

            <div class="auth-switch">
                Don't have an account? <a href="register.html">Create one here</a>
            </div>

            <div style="text-align:center;margin-top:16px">
                <a href="index.html" style="font-size:13px;color:var(--text-muted)">
                    <i class="fas fa-arrow-left" style="margin-right:4px"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
